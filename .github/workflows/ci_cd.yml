name: NileTech Gated Production CI/CD & Smoke Test Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-deploy:
    name: 🛡️ Pre-Deploy Gate, Deployment, and Smoke Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Env
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # =========================================================================
    # STAGE 1: PRE-DEPLOYMENT TESTING GATE
    # =========================================================================
    - name: Spin Up Local Mock Backend for Pre-Test Validation
      run: |
        python -c "
        from flask import Flask
        app = Flask(__name__)
        @app.route('/health')
        def h(): return {'status':'healthy'}, 200
        @app.route('/chat', methods=['POST'])
        def c(): return {'answer':'mock','sources':[]}, 200
        app.run(port=5000)
        " &
        sleep 3

    - name: Execute Local Pytest Suite Check
      run: |
        python -m pytest tests/test_app.py -v

    # =========================================================================
    # STAGE 2: PRODUCTION DEPLOYMENT (Only triggers on code merges/pushes)
    # =========================================================================
    - name: Deploy to Railway via Webhook Integration Engine
      if: github.event_name == 'push'
      uses: bervincode/railway-deploy@main
      with:
        railway_token: ${{ secrets.RAILWAY_TOKEN }}

    # =========================================================================
    # STAGE 3: POST-DEPLOYMENT LIVE SMOKE TESTING IN GITHUB ACTIONS
    # =========================================================================
    - name: Buffer Wait Window for Production Initialization
      if: github.event_name == 'push'
      # Gives Railway a brief 30-second window to build and spin up the container
      run: sleep 30

    - name: Execute Live Production Smoke Tests inside Git Actions
      if: github.event_name == 'push'
      env:
        # Passes the live public URL secret to the GitHub Actions test block
        PRODUCTION_BACKEND_URL: ${{ secrets.PRODUCTION_BACKEND_URL }}
      run: |
        python -m pytest tests/test_smoke.py -v
