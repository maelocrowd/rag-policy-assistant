name: CI Build Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up future workflow runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run application start check
      run: |
        # Verifies the main application module imports properly without syntax errors
        python -c "import app"

    - name: Run automated test suite (Optional)
      run: |
        # Only executes if pytest is installed in your requirements.txt
        if pip show pytest > /dev/null 2>&1; then
          pytest -q
        else
          echo "Pytest not found; skipping unit tests."
        fi
