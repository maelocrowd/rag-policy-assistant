name: CI Build & Test Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      LLM_MODEL: google/gemma-4-31b-it:free
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      BACKEND_URL: http://127.0.0.1:5000
      CHROMA_DIR: data/chroma_db
      CORPUS_DIR: ./documents
      CHUNK_SIZE: 500
      CHUNK_OVERLAP: 100
      TOP_K: 4
      SEED: 42
      STREAMLIT_SERVER_HEADLESS: "true"
      # Forces HuggingFace to use a predictable caching route
      HF_HOME: ~/.cache/huggingface

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # Cache AI Models so they don't timeout your backend startup
    - name: Cache HuggingFace models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-${{ env.EMBEDDING_MODEL }}
        restore-keys: |
          ${{ runner.os }}-hf-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest streamlit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Pre-download Embedding Model
      run: |
        # Download the embedding model before starting the server 
        # This keeps backend initialization lean and fast
        python -c "from transformers import AutoTokenizer, AutoModel; AutoTokenizer.from_pretrained('${{ env.EMBEDDING_MODEL }}'); AutoModel.from_pretrained('${{ env.EMBEDDING_MODEL }}')"

    - name: Run application syntax checks
      run: |
        python -m py_compile api.py
        python -m py_compile app.py

    - name: Start Backend API Server (Port 5000)
      run: |
        nohup python -u api.py > backend.log 2>&1 &
        
        echo "Waiting for backend server to spin up and fully load models..."
        # Extended window to 45 seconds to safely clear slow database configurations
        for i in {1..45}; do
          if nc -z 127.0.0.1 5000; then
            echo "✅ Backend network port is accessible!"
            # Give the framework application loop 3 extra seconds to finish starting
            sleep 3
            exit 0
          fi
          sleep 1
        done
        echo "❌ Backend server failed to start! Printing logs:"
        cat backend.log
        exit 1

    - name: Start Streamlit App Server (Port 8501)
      run: |
        nohup streamlit run app.py > streamlit.log 2>&1 &
        
        echo "Waiting for Streamlit server to spin up..."
        for i in {1..15}; do
          if nc -z 127.0.0.1 8501; then
            echo "✅ Streamlit app is up!"
            exit 0
          fi
          sleep 1
        done
        echo "❌ Streamlit server failed to start! Printing logs:"
        cat streamlit.log
        exit 1

    - name: Run test suite
      run: |
        pytest -q tests/
