name: CI Build & Test Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Ensure pytest is installed for the test suite
        python -m pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run application start checks
      run: |
        # Verifies backend API module imports without syntax errors
        python -c "import api"
        # Verifies Streamlit app module imports without syntax errors
        python -c "import app"

    - name: Run test suite
      run: |
        # Executes all tests inside the tests/ directory
        pytest -q tests/
